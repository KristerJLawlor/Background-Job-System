# Disable distributed tracing in tests — avoids OTLP connection attempts and log noise
management.tracing.sampling.probability=0.0

api.key=test-key

# S3 stub values — AwsConfig creates a real S3Client (no actual calls made at creation time)
aws.s3.region=us-east-1
aws.s3.bucket-name=test-bucket
aws.s3.endpoint-override=
aws.access-key-id=test
aws.secret-access-key=test
job.result.s3-expiry-days=1
