server.port=${PORT:8080}

# tracing — service name appears as the root resource in X-Ray / Jaeger / Datadog APM
spring.application.name=background-job-system
# sample everything by default; lower in production (e.g. 0.1 = 10%) via TRACING_SAMPLE_RATE
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
# OTLP endpoint — points at an OTel Collector, AWS ADOT sidecar, or Jaeger
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# folder for processed avatars
avatars.path=${AVATAR_DIR:/app/avatars}

# actuator configuration
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=never

# graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# per-IP rate limit on job submission
job.rate-limit.requests-per-minute=${JOB_RATE_LIMIT_RPM:10}

# job result TTL and eviction sweep interval
job.result.ttl-minutes=${JOB_RESULT_TTL_MINUTES:60}
job.result.eviction-interval-ms=${JOB_RESULT_EVICTION_INTERVAL_MS:60000}

# job executor thread pool
job.executor.core-pool-size=${JOB_EXECUTOR_CORE_POOL_SIZE:2}
job.executor.max-pool-size=${JOB_EXECUTOR_MAX_POOL_SIZE:4}
job.executor.queue-capacity=${JOB_EXECUTOR_QUEUE_CAPACITY:100}
