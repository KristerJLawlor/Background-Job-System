server.port=${PORT:8080}

# tracing — service name appears as the root resource in X-Ray / Jaeger / Datadog APM
spring.application.name=background-job-system
# sample everything by default; lower in production (e.g. 0.1 = 10%) via TRACING_SAMPLE_RATE
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
# OTLP endpoint — points at an OTel Collector, AWS ADOT sidecar, or Jaeger
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# folder for processed avatars
avatars.path=${AVATAR_DIR:/app/avatars}

# actuator configuration
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=never

# graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# API key — set API_KEY env var in production; the default is only for local dev
api.key=${API_KEY:changeme}

# per-IP rate limit on job submission
job.rate-limit.requests-per-minute=${JOB_RATE_LIMIT_RPM:10}

# job result TTL — Redis handles expiry natively using this value
job.result.ttl-minutes=${JOB_RESULT_TTL_MINUTES:60}

# number of worker threads blocking on the Redis queue
job.worker.thread-count=${JOB_WORKER_THREADS:2}

# retry policy for failed jobs
job.retry.max-attempts=${JOB_RETRY_MAX_ATTEMPTS:3}
job.retry.base-delay-seconds=${JOB_RETRY_BASE_DELAY_SECONDS:10}

# Redis connection
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# S3 result storage
aws.s3.bucket-name=${S3_BUCKET_NAME:avatar-results}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.endpoint-override=${S3_ENDPOINT_OVERRIDE:}
aws.access-key-id=${AWS_ACCESS_KEY_ID:test}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:test}
