server.port=${PORT:8080}

# folder for processed avatars
avatars.path=${AVATAR_DIR:/app/avatars}

# actuator configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# per-IP rate limit on job submission
job.rate-limit.requests-per-minute=${JOB_RATE_LIMIT_RPM:10}

# job result TTL and eviction sweep interval
job.result.ttl-minutes=${JOB_RESULT_TTL_MINUTES:60}
job.result.eviction-interval-ms=${JOB_RESULT_EVICTION_INTERVAL_MS:60000}

# job executor thread pool
job.executor.core-pool-size=${JOB_EXECUTOR_CORE_POOL_SIZE:2}
job.executor.max-pool-size=${JOB_EXECUTOR_MAX_POOL_SIZE:4}
job.executor.queue-capacity=${JOB_EXECUTOR_QUEUE_CAPACITY:100}

# logging format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger - %msg%n