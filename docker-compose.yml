name: background-job-system

services:

  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
      AVATAR_DIR: /app/avatars
      REDIS_HOST: redis
      # point at the jaeger service by name — overrides the localhost:4318 default
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      TRACING_SAMPLE_RATE: "1.0"
      API_KEY: ${API_KEY:changeme}
      S3_BUCKET_NAME: avatar-results
      AWS_REGION: us-east-1
      S3_ENDPOINT_OVERRIDE: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - avatars:/app/avatars
    depends_on:
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      jaeger:
        condition: service_started
    restart: on-failure

  # Redis is wired up here ahead of the queue migration so the service topology is
  # already correct when the in-memory queue is replaced with a Redis-backed one.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # LocalStack emulates AWS S3 locally. The init script creates the avatar-results bucket
  # on startup. Use awslocal (bundled in the image) for manual inspection.
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh"
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus scrapes /actuator/prometheus every 15s. Open http://localhost:9090.
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  # Grafana visualises Prometheus metrics. Open http://localhost:3000 (admin/admin).
  # The datasource and overview dashboard are provisioned automatically on startup.
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning"
      - "./grafana/dashboards:/etc/grafana/dashboards"
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # Jaeger all-in-one receives OTLP traces from the api and serves the trace UI.
  # Open http://localhost:16686 to browse traces after submitting jobs.
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP/HTTP receiver
    restart: unless-stopped

volumes:
  # named volume keeps processed avatars across container restarts
  avatars:
  # grafana internal state (plugins, user preferences, alert state)
  grafana-data:
