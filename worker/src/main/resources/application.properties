server.port=8081
spring.application.name=background-job-system-worker

management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
management.endpoints.web.exposure.include=health,metrics,prometheus

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

aws.s3.bucket-name=${S3_BUCKET_NAME:avatar-results}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.endpoint-override=${S3_ENDPOINT_OVERRIDE:}
aws.access-key-id=${AWS_ACCESS_KEY_ID:test}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:test}

job.result.ttl-minutes=${JOB_RESULT_TTL_MINUTES:60}
job.result.s3-expiry-days=${JOB_RESULT_EXPIRY_DAYS:1}
job.worker.thread-count=${JOB_WORKER_THREADS:2}
job.retry.max-attempts=${JOB_RETRY_MAX_ATTEMPTS:3}
job.retry.base-delay-seconds=${JOB_RETRY_BASE_DELAY_SECONDS:10}
